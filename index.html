<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sweet Slot Mini App</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Telegram WebApp (не обязателен для работы в браузере) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="title">SWEET SLOT</div>
      <div class="status">
        <div class="pill">Баланс: <b id="balance">10000</b> 💰</div>
        <div class="pill">Ставка: <b id="bet">100</b> 💰</div>
      </div>
      <div class="status">
        <div class="pill">FS: <b id="fs">0</b></div>
        <div class="pill">Последний выигрыш: <b id="lastWin">0</b></div>
      </div>
    </header>

    <main class="panel">
      <div id="slot" class="slot"></div>

      <div class="controls">
        <button id="betMinus" class="btn ghost">−</button>
        <button id="spin" class="btn primary">SPIN</button>
        <button id="betPlus" class="btn ghost">+</button>

        <button id="auto" class="btn">AUTO: OFF</button>
        <button id="buyBonus" class="btn bonus">Купить бонус (10 FS)</button>
      </div>

      <div class="note" id="note"></div>
    </main>

    <footer class="footer">
      <div class="small">
        Домики (🏠) только на барабанах 1,2,5 → 3+ домика = 10 FS<br/>
        Иксы (2×,3×) только на барабанах 2,3,4 → умножают выигрыш спина
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
